name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: 'echo "Node: $(node -v)"'
      - run: 'echo "npm: $(npm -v)"'
      - run: npm install
      - run: npm run build
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: |
            *.vsix
